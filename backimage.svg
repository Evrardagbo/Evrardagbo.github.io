<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="fond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#fce4ec;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8f5e9;stop-opacity:1"/>
    </linearGradient>

    <radialGradient id="bulle1" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="bulle2" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#bbdefb;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="bulle3" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#f8bbd0;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#f8bbd0;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="bulle4" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Fond dégradé doux -->
  <rect width="1080" height="1920" fill="url(#fond)"/>

  <!-- ── VAGUES ── -->
  <!-- Vague 1 - haut - bleu clair -->
  <path d="M0,180 C150,120 300,240 450,180 C600,120 750,240 900,180 C1000,140 1050,160 1080,170 L1080,0 L0,0 Z"
        fill="#bbdefb" opacity="0.35"/>

  <!-- Vague 2 - milieu haut -->
  <path d="M0,420 C200,350 350,490 550,420 C720,360 880,470 1080,400 L1080,320 C880,390 720,280 550,340 C350,410 200,270 0,340 Z"
        fill="#f8bbd0" opacity="0.3"/>

  <!-- Vague 3 - milieu -->
  <path d="M0,780 C180,710 360,850 540,780 C720,710 900,830 1080,760 L1080,700 C900,770 720,650 540,720 C360,790 180,650 0,720 Z"
        fill="#c8e6c9" opacity="0.3"/>

  <!-- Vague 4 - milieu bas -->
  <path d="M0,1100 C220,1030 400,1150 600,1090 C780,1030 950,1140 1080,1080 L1080,1020 C950,1080 780,970 600,1030 C400,1090 220,970 0,1040 Z"
        fill="#bbdefb" opacity="0.28"/>

  <!-- Vague 5 - bas -->
  <path d="M0,1450 C200,1380 380,1500 580,1440 C760,1380 940,1490 1080,1430 L1080,1370 C940,1430 760,1320 580,1380 C380,1440 200,1320 0,1390 Z"
        fill="#f8bbd0" opacity="0.28"/>

  <!-- Vague 6 - tout bas -->
  <path d="M0,1750 C180,1680 380,1800 560,1740 C740,1680 920,1790 1080,1730 L1080,1920 L0,1920 Z"
        fill="#c8e6c9" opacity="0.3"/>

  <!-- ── BULLES ── -->
  <circle cx="100" cy="200" r="90" fill="url(#bulle2)" />
  <circle cx="950" cy="150" r="70" fill="url(#bulle3)" />
  <circle cx="540" cy="400" r="110" fill="url(#bulle1)" />
  <circle cx="200" cy="650" r="80" fill="url(#bulle4)" />
  <circle cx="880" cy="550" r="95" fill="url(#bulle2)" />
  <circle cx="400" cy="900" r="75" fill="url(#bulle3)" />
  <circle cx="750" cy="1000" r="100" fill="url(#bulle4)" />
  <circle cx="120" cy="1150" r="85" fill="url(#bulle2)" />
  <circle cx="960" cy="1200" r="70" fill="url(#bulle1)" />
  <circle cx="500" cy="1350" r="90" fill="url(#bulle3)" />
  <circle cx="250" cy="1600" r="80" fill="url(#bulle4)" />
  <circle cx="820" cy="1550" r="100" fill="url(#bulle2)" />
  <circle cx="600" cy="1800" r="75" fill="url(#bulle1)" />
  <circle cx="1000" cy="1750" r="65" fill="url(#bulle3)" />

  <!-- Petites bulles décoratives -->
  <circle cx="300" cy="100" r="18" fill="#ffffff" opacity="0.5"/>
  <circle cx="700" cy="80" r="12" fill="#ffffff" opacity="0.45"/>
  <circle cx="50" cy="450" r="15" fill="#ffffff" opacity="0.4"/>
  <circle cx="1030" cy="400" r="20" fill="#ffffff" opacity="0.45"/>
  <circle cx="450" cy="700" r="14" fill="#ffffff" opacity="0.4"/>
  <circle cx="850" cy="800" r="16" fill="#ffffff" opacity="0.45"/>
  <circle cx="170" cy="1000" r="12" fill="#ffffff" opacity="0.4"/>
  <circle cx="680" cy="1200" r="18" fill="#ffffff" opacity="0.45"/>
  <circle cx="350" cy="1450" r="14" fill="#ffffff" opacity="0.4"/>
  <circle cx="900" cy="1400" r="20" fill="#ffffff" opacity="0.45"/>
  <circle cx="150" cy="1800" r="16" fill="#ffffff" opacity="0.4"/>
  <circle cx="750" cy="1850" r="12" fill="#ffffff" opacity="0.4"/>
</svg>
