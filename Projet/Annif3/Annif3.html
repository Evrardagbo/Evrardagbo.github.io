
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Joyeux Anniversaire Evrard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0018;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .carte-wrapper {
      width: 100%;
      max-width: 800px;
    }
    svg { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
<div class="carte-wrapper">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 800 500" width="800" height="500"
  font-family="Georgia, 'Times New Roman', serif">

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="50%" stop-color="#3b0764"/>
      <stop offset="100%" stop-color="#1e1040"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFD700"/>
      <stop offset="40%"  stop-color="#FFF5A0"/>
      <stop offset="70%"  stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <pattern id="stars" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1"   fill="white" opacity="0.25"/>
      <circle cx="40" cy="25" r="1.5" fill="white" opacity="0.2"/>
      <circle cx="55" cy="50" r="1"   fill="white" opacity="0.3"/>
      <circle cx="20" cy="48" r="0.8" fill="white" opacity="0.15"/>
      <circle cx="50" cy="8"  r="1.2" fill="white" opacity="0.2"/>
    </pattern>
    <!-- Clip cercle photo -->
    <clipPath id="photoClip">
      <circle cx="170" cy="210" r="88"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <rect width="800" height="500" fill="url(#stars)"/>

  <!-- Blobs lumineux -->
  <circle cx="80"  cy="60"  r="120" fill="#7c3aed" opacity="0.15"/>
  <circle cx="720" cy="440" r="140" fill="#ec4899" opacity="0.12"/>
  <circle cx="680" cy="80"  r="90"  fill="#06b6d4" opacity="0.10"/>

  <!-- Bordures carte -->
  <rect x="18" y="18" width="764" height="464" rx="24" ry="24"
    fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.7"/>
  <rect x="28" y="28" width="744" height="444" rx="18" ry="18"
    fill="none" stroke="#FFD700" stroke-width="0.8" opacity="0.3"/>

  <!-- Cercle fond photo -->
  <circle cx="170" cy="210" r="93" fill="#2d1458"/>

  <!-- PHOTO intégrée dans le cercle -->
  <image id="photo"
    x="82" y="118" width="176" height="184"
    clip-path="url(#photoClip)"
    preserveAspectRatio="xMidYMin slice"
    href="data:image/jpeg;base64,PHOTO_BASE64_ICI"/>

  <!-- Bordure dorée autour de la photo -->
  <circle cx="170" cy="210" r="93"
    fill="none" stroke="url(#goldGrad)" stroke-width="3.5" filter="url(#glow)"/>
  <circle cx="170" cy="210" r="105"
    fill="none" stroke="#FFD700" stroke-width="1" stroke-dasharray="4 6" opacity="0.35"/>

  <!-- Décorations gauche -->
  <text x="60"  y="355" font-size="22" opacity="0.6">🎈</text>
  <text x="250" y="370" font-size="18" opacity="0.5">🎀</text>
  <text x="95"  y="410" font-size="14" fill="#FFD700" opacity="0.4">✦</text>
  <text x="220" y="330" font-size="12" fill="#FFD700" opacity="0.4">✦</text>

  <!-- Zone date -->
  <rect x="55" y="400" width="230" height="36" rx="18"
    fill="#ffffff" fill-opacity="0.07"
    stroke="#FFD700" stroke-width="1" stroke-opacity="0.4"/>
  <text x="170" y="423" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="12" fill="#FFD700" opacity="0.9">
    📅 29 Avril 2010
  </text>

  <!-- Séparateur vertical -->
  <line x1="315" y1="50" x2="315" y2="450"
    stroke="url(#goldGrad)" stroke-width="1.2" stroke-opacity="0.35"/>
  <g transform="translate(315,250)">
    <polygon points="0,-12 3,-4 12,-4 5,2 8,12 0,6 -8,12 -5,2 -12,-4 -3,-4"
      fill="url(#goldGrad)" opacity="0.7"/>
  </g>

  <!-- ═══ COLONNE DROITE ═══ -->
  <text x="558" y="72" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="12"
    fill="#d8b4fe" letter-spacing="4" opacity="0.85">✦  C É L É B R A T I O N  ✦</text>

  <text x="558" y="130" text-anchor="middle"
    font-family="Georgia, serif" font-size="44" font-weight="bold"
    fill="url(#goldGrad)" filter="url(#glow)" letter-spacing="1">Joyeux</text>

  <text x="558" y="185" text-anchor="middle"
    font-family="Georgia, serif" font-size="44" font-weight="bold"
    fill="url(#goldGrad)" filter="url(#glow)" letter-spacing="1">Anniversaire</text>

  <!-- Ligne déco -->
  <line x1="400" y1="200" x2="716" y2="200"
    stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
  <circle cx="558" cy="200" r="4" fill="#FFD700" opacity="0.8"/>
  <circle cx="400" cy="200" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="716" cy="200" r="2" fill="#FFD700" opacity="0.5"/>

  <!-- Zone nom -->
  <rect x="395" y="215" width="326" height="58" rx="12"
    fill="#ffffff" fill-opacity="0.04"
    stroke="url(#goldGrad)" stroke-width="1.8" stroke-dasharray="6 4" opacity="0.7"/>
  <text x="415" y="231" font-family="Arial, sans-serif" font-size="9"
    fill="#a855f7" opacity="0.7" letter-spacing="1">AGBO</text>
  <text x="558" y="259" text-anchor="middle"
    font-family="Georgia, serif" font-size="28" font-weight="bold"
    fill="#ffffff" opacity="0.95" letter-spacing="2">Evrard</text>

  <!-- Gâteau -->
  <text x="558" y="312" text-anchor="middle" font-size="32">🎂</text>

  <!-- Zone message -->
  <rect x="395" y="325" width="326" height="96" rx="10"
    fill="#ffffff" fill-opacity="0.05"
    stroke="#d8b4fe" stroke-width="1" stroke-opacity="0.4"/>
  <text x="558" y="348" text-anchor="middle"
    font-family="Georgia, serif" font-size="12.5" fill="#e9d5ff" opacity="0.9" font-style="italic">
    Je te souhaite les vœux que tu
  </text>
  <text x="558" y="366" text-anchor="middle"
    font-family="Georgia, serif" font-size="12.5" fill="#e9d5ff" opacity="0.9" font-style="italic">
    te souhaites chaque jour. Que tout
  </text>
  <text x="558" y="384" text-anchor="middle"
    font-family="Georgia, serif" font-size="12.5" fill="#e9d5ff" opacity="0.9" font-style="italic">
    le bonheur du monde soit pour toi.
  </text>
  <text x="558" y="406" text-anchor="middle"
    font-family="Georgia, serif" font-size="12.5" fill="#e9d5ff" opacity="0.9" font-style="italic">
    Avec toute notre affection 💜
  </text>

  <!-- Signature -->
  <line x1="420" y1="432" x2="696" y2="432"
    stroke="#d8b4fe" stroke-width="0.8" opacity="0.3"/>
  <text x="558" y="453" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="10"
    fill="#a855f7" opacity="0.8" letter-spacing="1">DE LA PART DE : Ta boss su 💜</text>

  <!-- Coins décoratifs -->
  <g opacity="0.5">
    <line x1="30" y1="50" x2="70" y2="50" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="50" y1="30" x2="50" y2="70" stroke="#FFD700" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="4" fill="#FFD700"/>
  </g>
  <g opacity="0.5">
    <line x1="730" y1="50" x2="770" y2="50" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="750" y1="30" x2="750" y2="70" stroke="#FFD700" stroke-width="1.5"/>
    <circle cx="750" cy="50" r="4" fill="#FFD700"/>
  </g>
  <g opacity="0.5">
    <line x1="30" y1="450" x2="70" y2="450" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="50" y1="430" x2="50" y2="470" stroke="#FFD700" stroke-width="1.5"/>
    <circle cx="50" cy="450" r="4" fill="#FFD700"/>
  </g>
  <g opacity="0.5">
    <line x1="730" y1="450" x2="770" y2="450" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="750" y1="430" x2="750" y2="470" stroke="#FFD700" stroke-width="1.5"/>
    <circle cx="750" cy="450" r="4" fill="#FFD700"/>
  </g>

  <!-- Confettis -->
  <g opacity="0.5">
    <rect x="340" y="55" width="8" height="8" rx="2" fill="#FFD700" transform="rotate(25,344,59)"/>
    <rect x="370" y="40" width="6" height="6" rx="1" fill="#ec4899" transform="rotate(-15,373,43)"/>
    <rect x="490" y="45" width="7" height="7" rx="2" fill="#06b6d4" transform="rotate(40,493,48)"/>
    <rect x="620" y="38" width="8" height="8" rx="2" fill="#a855f7" transform="rotate(-30,624,42)"/>
    <rect x="700" y="60" width="6" height="6" rx="1" fill="#FFD700" transform="rotate(20,703,63)"/>
    <circle cx="450" cy="462" r="4" fill="#ec4899"/>
    <circle cx="520" cy="470" r="3" fill="#FFD700"/>
    <circle cx="660" cy="465" r="4" fill="#06b6d4"/>
    <rect x="580" y="455" width="7" height="7" rx="1" fill="#a855f7" transform="rotate(45,583,458)"/>
  </g>

</svg>
</div>

<script>
// Chargement automatique de la photo via FileReader
const img = new Image();
img.crossOrigin = "anonymous";

// Conversion de la photo en base64 pour l'intégrer dans le SVG
fetch("jean_paul.jpg")
  .then(r => r.blob())
  .then(blob => {
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById("photo").setAttribute("href", e.target.result);
    };
    reader.readAsDataURL(blob);
  })
  .catch(() => {
    // Si pas de fichier externe, utiliser l'image intégrée
    loadPhotoFromInput();
  });

function loadPhotoFromInput() {
  const div = document.createElement("div");
  div.style.cssText = "position:fixed;bottom:20px;right:20px;background:rgba(124,58,237,0.9);padding:14px 20px;border-radius:16px;color:white;font-family:Arial;font-size:13px;z-index:999;border:1px solid #FFD700;text-align:center;max-width:220px;";
  div.innerHTML = `
    <div style="font-size:20px;margin-bottom:6px">📸</div>
    <div style="font-weight:bold;margin-bottom:8px">Ajouter la photo</div>
    <input type="file" accept="image/*" id="photoInput" style="display:none">
    <label for="photoInput" style="background:#FFD700;color:#1a0533;padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:bold;font-size:12px;">
      Choisir une photo
    </label>
  `;
  document.body.appendChild(div);

  document.getElementById("photoInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById("photo").setAttribute("href", ev.target.result);
      div.innerHTML = `<div style="font-size:24px">✅</div><div style="margin-top:6px;font-weight:bold">Photo ajoutée !</div>`;
      setTimeout(() => div.remove(), 2000);
    };
    reader.readAsDataURL(file);
  });
}

// Lancer directement le sélecteur de photo
loadPhotoFromInput();
</script>
</body>
</html>
