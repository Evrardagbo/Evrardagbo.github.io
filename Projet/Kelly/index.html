<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style_projet_2.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Mon compte d'identification</title>
</head>
<script>
  let likes = 60000, reposted = 30000, shares = 15000;
  let likeActif = false, repostActif = false, abonneActif = false;

  function fmt(n) {
    return n >= 1000 ? (n / 1000).toFixed(1).replace('.0','') + 'k' : n;
  }

  // ── Like ──
  function toggleLike() {
    likeActif = !likeActif;
    likes += likeActif ? 1 : -1;
    document.getElementById('likeCount').textContent = fmt(likes);
    const svg = document.querySelector('#divLike svg');
    svg.setAttribute('fill', likeActif ? '#e74c3c' : 'none');
    svg.setAttribute('stroke', likeActif ? '#e74c3c' : '#000000');
    showToast(likeActif ? '❤️ Vous aimez ce profil !' : 'Like retiré');
  }

  // ── Repost ──
  function toggleRepost() {
    repostActif = !repostActif;
    reposted += repostActif ? 1 : -1;
    document.getElementById('repostCount').textContent = fmt(reposted);
    const svg = document.querySelector('#divRepost svg');
    svg.setAttribute('fill', repostActif ? '#2ecc71' : '#1f1f1f');
    showToast(repostActif ? '🔁 Reposté !' : 'Repost annulé');
  }

  // ── Partager ──
  function partager() {
    shares += 1;
    document.getElementById('shareCount').textContent = fmt(shares);
    if (navigator.share) {
      navigator.share({ title: 'Sènami', url: window.location.href });
    } else {
      navigator.clipboard.writeText(window.location.href).catch(()=>{});
      showToast('📤 Lien copié !');
    }
  }

  // ── S'abonner ──
  function toggleAbonner() {
    abonneActif = !abonneActif;
    const btn = document.getElementById('btnAbonner');
    btn.textContent = abonneActif ? '✓ Abonné(e)' : "S'abonner";
    btn.style.background = abonneActif ? '#555' : '';
    showToast(abonneActif ? '🔔 Abonnement confirmé !' : 'Abonnement annulé');
  }

  // ── Message ──
  function ouvrirMessage() {
    showToast('✉ Messagerie bientôt disponible !');
  }

  // ── Toast ──
  function showToast(msg) {
    let t = document.getElementById('toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'toast';
      t.style.cssText = `position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
        background:#d4af37;color:#111;padding:10px 22px;border-radius:50px;
        font-size:0.85rem;font-weight:600;opacity:0;transition:opacity 0.3s;
        pointer-events:none;z-index:999;`;
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.style.opacity = '0', 2500);
  }
</script>
<body>
    <div class="imag-card">
        <div class="image">
            <img src="photokelly.jpg" alt="photo" class="profil-image">
        </div>
        <div class="text-data">
            <span class="name">Kelly Elisa</span>
            <span class="job">YouTuber & Blogger</span>
        </div>
        <div class="media-buttons">
                                                                          
<a href="https://www.facebook.com/profile.php?id=100089214049655" target="_blank">
  <i class="fab fa-facebook" style="font-size: 30px; color: #1877F2;"></i>
</a>

<a href="https://twitter.com/toncompte" target="_blank">
  <i class="fab fa-twitter" style="font-size: 30px; color: #1DA1F2;"></i></a>
                                                            
<a href="https://www.instagram.com/kelly_elisa_sn/" target="_blank">
  <i class="fab fa-instagram" style="font-size: 30px; color: #E4405F;"></i>
</a>
<a href="https://youtube.com/tonchaine" target="_blank">
  <i class="fab fa-youtube" style="font-size: 30px; color: #FF0000;"></i>
</a>


        
     </div>
     <div class="buttons">
        <button class="button"id="btnAbonner" onclick="toggleAbonner()"> S'abonner</button>
        <button class="button" id="btnMessage" onclick="ouvrirMessage()"> Messages</button>
     </div>
     <div class="analytics">
        <div class="data" id="divRepost" onclick="toggleRepost()" style="cursor:pointer;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart-icon lucide-heart"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/></svg>
        <span class="number" id="likeCount">60k</span>
      </div>
       <div class="data" id="divRepost" onclick="toggleRepost()" style="cursor:pointer;">
       <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M320-60v-221q-101-8-170.5-82T80-540q0-109 75.5-184.5T340-800h27l-63-64 56-56 160 160-160 160-56-56 63-64h-27q-75 0-127.5 52.5T160-540q0 75 52.5 127.5T340-360h60v107l107-107h113q75 0 127.5-52.5T800-540q0-75-52.5-127.5T620-720h-20v-80h20q109 0 184.5 75.5T880-540q0 109-75.5 184.5T620-280h-80L320-60Z"/></svg>
        <span class="number" id="repostCount">30k</span>
    </div>
     <div class="data" id="divShare" onclick="partager()" style="cursor:pointer;">
   <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-share-icon lucide-share"><path d="M12 2v13"/><path d="m16 6-4-4-4 4"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/></svg>
        <span class="number" id="shareCount">15k</span>
    </div>

     </div>
    </div>
    
</body>
</html>
