<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="Style Facebook.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook – Connexion</title>                 
</head>
<body>

<div class="container">
    <!-- Partie gauche -->
    <div class="left">
        <h1 class="logo">Facebook</h1>
        <p class="slogan">
            Avec Facebook, partagez et restez en contact avec votre entourage.
        </p>
    </div>

    <!-- Partie droite -->
    <div class="right">
        <div class="login-box">
            <input type="text" placeholder="Adresse e-mail ou numéro de tél.">
            <input type="password" placeholder="Mot de passe">

            <button class="login-btn">Se connecter</button>
            <a href="#" class="forgot">Mot de passe oublié ?</a>
            <hr>

            <button class="create-btn">Créer un nouveau compte</button>
        </div>

        <p class="page-link">
            <strong>Créer une Page</strong> pour une célébrité, une marque ou une entreprise.
        </p>
    </div>
</div>


</body>
</html>

</body>
</html>
