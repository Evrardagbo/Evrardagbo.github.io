<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="stylee.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Spotify</title>
</head>
<body>
<div class="container">
    <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Spotify_logo_with_text.svg" alt="Spotify">
    </div>

    <h1>
        Inscrivez-vous<br>
        pour commencer<br>
        à écouter
    </h1>

    <form>
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" placeholder="nom@domaine.com">

        <button class="btn-green">Suivant</button>
    </form>

    <div class="divider">ou</div>

    <button class="btn-outline google"><a href="https://www.google.com" 
target="_blank" style="float: left;">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20" height="20">
    <path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 8 2.9l6-6C34.5 3.1 29.6 1 24 1 14.8 1 7 6.7 3.7 14.6l7 5.4C12.4 13.6 17.7 9.5 24 9.5z" />
    <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-16.9z" />
    <path fill="#FBBC05" d="M10.7 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.7-4.6l-7-5.4A23.8 23.8 0 0 0 .5 24c0 3.8.9 7.4 2.5 10.6l7.7-6z" />
    <path fill="#34A853" d="M24 47c5.4 0 10-1.8 13.3-4.8l-7.4-5.7c-1.8 1.2-4.2 2-5.9 2-6.3 0-11.6-4.1-13.5-9.9l-7.7 6C7 40.3 14.8 47 24 47z" />
</svg>
</a>
  Inscrivez-vous avec Google
    </button>

    <button class="btn-outline apple">
        S'inscrire avec Apple
    </button>

    <p class="login">
        Vous avez déjà un compte ?<br>
        <a href="#">Se connecter</a>
    </p>

    <p class="footer">
        This site is protected by reCAPTCHA and the Google
        <a href="#">Privacy Policy</a> and
        <a href="#">Terms of Service</a> apply.
    </p>
</div>

</body>
</html>
