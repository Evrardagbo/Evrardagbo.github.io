<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Joyeux Anniversaire Sènami 🥳💝</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0018;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Georgia, serif;
    }

    .carte {
      width: 100%;
      max-width: 480px;
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(124,58,237,0.5);
    }

    /* La photo occupe tout le fond */
    .photo-bg {
      width: 100%;
      display: block;
      border-radius: 28px;
    }

    /* Overlay dégradé bas */
    .overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(to top, rgba(10,0,30,0.92) 0%, transparent 100%);
      border-radius: 0 0 28px 28px;
    }

    /* Contenu texte en bas */
    .contenu {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 24px 28px;
      text-align: center;
    }

    .nom {
      font-size: 22px;
      font-weight: bold;
      color: #FFD700;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255,215,0,0.6);
      margin-bottom: 4px;
    }

    .famille {
      font-size: 11px;
      color: #d8b4fe;
      letter-spacing: 3px;
      margin-bottom: 14px;
      opacity: 0.8;
    }

    .message {
      font-size: 13px;
      color: #e9d5ff;
      font-style: italic;
      line-height: 1.7;
      margin-bottom: 14px;
      opacity: 0.9;
    }

    .separateur {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, #FFD700, transparent);
      margin: 10px auto;
    }

    .signature {
      font-size: 11px;
      color: #a855f7;
      letter-spacing: 2px;
      opacity: 0.85;
    }

    .date-badge {
      display: inline-block;
      background: rgba(255,215,0,0.12);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 20px;
      padding: 4px 16px;
      font-size: 11px;
      color: #FFD700;
      margin-bottom: 12px;
    }

    /* Bordure dorée autour de la carte */
    .carte::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 28px;
      border: 2px solid rgba(255,215,0,0.5);
      pointer-events: none;
      z-index: 10;
    }

    /* Coins décoratifs */
    .coin {
      position: absolute;
      width: 24px; height: 24px;
      z-index: 11;
    }
    .coin-tg { top: 14px; left: 14px;
      border-top: 2px solid #FFD700; border-left: 2px solid #FFD700; border-radius: 4px 0 0 0; }
    .coin-td { top: 14px; right: 14px;
      border-top: 2px solid #FFD700; border-right: 2px solid #FFD700; border-radius: 0 4px 0 0; }
    .coin-bg { bottom: 14px; left: 14px;
      border-bottom: 2px solid #FFD700; border-left: 2px solid #FFD700; border-radius: 0 0 0 4px; }
    .coin-bd { bottom: 14px; right: 14px;
      border-bottom: 2px solid #FFD700; border-right: 2px solid #FFD700; border-radius: 0 0 4px 0; }

    /* Bouton partage */
    .btn-partage {
      margin-top: 24px;
      padding: 14px 40px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      border: none; border-radius: 50px;
      color: white; font-size: 15px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(124,58,237,0.4);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div class="carte" id="carte">
  <!-- Coins décoratifs -->
  <div class="coin coin-tg"></div>
  <div class="coin coin-td"></div>
  <div class="coin coin-bg"></div>
  <div class="coin coin-bd"></div>

  <!-- Photo de fond intégrée en base64 -->
  <img class="photo-bg" id="photoBg" src="" alt="Evrard">

  <!-- Overlay -->
  <div class="overlay"></div>

  <!-- Contenu -->
  <div class="contenu">
    <div class="date-badge">📅14 Août 2005</div>
    <div class="nom">Evrard Sènami 😇💝</div>
    <div class="famille">AGBO</div>
    <div class="separateur"></div>
    <div class="message">
      Je te souhaite les vœux que tu te souhaites chaque jour.<br>
      Que tout le bonheur du monde soit pour toi. 💜
    </div>
    <div class="separateur"></div>
    <div class="signature">DE LA PART DE : Ton boss 😁😉</div>
  </div>
</div>

<button class="btn-partage" onclick="partager()">📤 Partager la carte</button>

<script>
  // Intégration de la photo en base64
  // Pour intégrer définitivement la photo, remplace la valeur de photoBase64
  // par le résultat de la conversion base64 de ton image.
  // En attendant, voici un chargeur automatique :

  function chargerPhoto(src) {
    document.getElementById("photoBg").src = src;
  }

  // Photo intégrée (base64 sera insérée ici automatiquement)
  const photoBase64 = "PHOTO_ICI";

  if (photoBase64 !== "PHOTO_ICI") {
    chargerPhoto(photoBase64);
  } else {
    // Bouton de sélection photo si pas encore intégrée
    const btn = document.createElement("div");
    btn.style.cssText = "position:fixed;bottom:90px;right:20px;background:rgba(124,58,237,0.95);padding:12px 18px;border-radius:16px;color:white;font-family:Arial;font-size:13px;z-index:999;border:1px solid #FFD700;text-align:center;";
    btn.innerHTML = `
      <div style="font-size:18px;margin-bottom:6px">📸 Ajouter photo</div>
      <input type="file" accept="image/*" id="photoInput" style="display:none">
      <label for="photoInput" style="background:#FFD700;color:#1a0533;padding:7px 14px;border-radius:20px;cursor:pointer;font-weight:bold;font-size:12px;">
        Choisir
      </label>
    `;
    document.body.appendChild(btn);

    document.getElementById("photoInput").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        chargerPhoto(ev.target.result);
        btn.innerHTML = `<div style="font-size:22px">✅</div><div style="margin-top:4px;font-weight:bold;font-size:12px">Photo ajoutée !</div>`;
        setTimeout(() => btn.remove(), 2000);
      };
      reader.readAsDataURL(file);
    });
  }

  // Partage
  function partager() {
    if (navigator.share) {
      navigator.share({
        title: "Joyeux Anniversaire Evrard !",
        text: "Je te souhaite un joyeux anniversaire ! 🎂💜",
      });
    } else {
      alert("Pour partager :\n1. Fais une capture d'écran\n2. Envoie via WhatsApp 📱");
    }
  }
</script>
</body>
</html>
