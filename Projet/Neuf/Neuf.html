<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizStat – Quiz Interactif</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --rose:#e91e8c;--rose-light:#f472b6;--rose-soft:#fce4f3;
      --rose-dark:#c2185b;--purple:#9b59b6;--bg:#fff5fb;
      --card:#ffffff;--text:#3a1a2e;--sub:#b06090;
    }
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* HEADER */
    header{
      background:linear-gradient(135deg,var(--rose-dark),var(--rose),var(--purple));
      padding:16px 30px;display:flex;align-items:center;justify-content:space-between;
      box-shadow:0 4px 20px rgba(233,30,140,.3);position:relative;overflow:hidden;
    }
    header::before{content:'';position:absolute;inset:0;
      background:radial-gradient(circle at 20% 50%,rgba(255,255,255,.08) 0%,transparent 60%)}
    .logo{font-family:'Fredoka One',cursive;font-size:1.8rem;color:#fff;z-index:1}
    .logo span{color:#ffe0f5}
    .header-right{z-index:1;display:flex;align-items:center;gap:14px}
    .score-badge{
      background:rgba(255,255,255,.2);color:#fff;border-radius:30px;
      padding:6px 18px;font-family:'Fredoka One',cursive;font-size:1rem
    }

    /* STARS */
    .star{position:absolute;color:rgba(255,255,255,.4);font-size:.7rem;animation:twinkle 2s infinite alternate}
    @keyframes twinkle{0%{opacity:.2;transform:scale(1)}100%{opacity:.9;transform:scale(1.4)}}

    /* HERO */
    .hero{
      background:linear-gradient(120deg,var(--rose-soft),#f3e8ff);
      padding:36px 20px 28px;text-align:center;position:relative;overflow:hidden
    }
    .hero h1{font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--rose-dark)}
    .hero p{color:var(--sub);margin-top:8px;font-size:1rem}
    .bubble{position:absolute;border-radius:50%;background:rgba(233,30,140,.07);animation:float 6s ease-in-out infinite}
    .bubble:nth-child(1){width:90px;height:90px;top:10%;left:4%;animation-delay:0s}
    .bubble:nth-child(2){width:60px;height:60px;top:55%;left:88%;animation-delay:2s}
    .bubble:nth-child(3){width:120px;height:120px;top:20%;left:78%;animation-delay:4s}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}

    /* CATÉGORIES */
    .cats{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:24px 20px 0}
    .cat-btn{
      padding:8px 20px;border:2px solid var(--rose-light);border-radius:30px;
      background:#fff;color:var(--rose-dark);font-family:'Nunito',sans-serif;
      font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s
    }
    .cat-btn:hover,.cat-btn.active{background:var(--rose);color:#fff;border-color:var(--rose)}

    /* QUIZ ZONE */
    main{max-width:750px;margin:0 auto;padding:24px 16px}

    /* PROGRESS */
    .prog-wrap{margin-bottom:18px}
    .prog-top{display:flex;justify-content:space-between;font-size:.85rem;color:var(--sub);margin-bottom:6px}
    .prog-bar{height:8px;background:#f0d0e8;border-radius:10px;overflow:hidden}
    .prog-fill{height:100%;border-radius:10px;background:linear-gradient(to right,var(--rose),var(--purple));transition:width .5s ease}

    /* QUESTION CARD */
    .q-card{
      background:var(--card);border-radius:22px;padding:28px;
      box-shadow:0 6px 24px rgba(233,30,140,.1);margin-bottom:20px;
      border-top:5px solid var(--rose);animation:slideIn .4s ease
    }
    @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .q-num{font-size:.8rem;color:var(--rose-light);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
    .q-cat-tag{
      display:inline-block;padding:3px 12px;border-radius:20px;font-size:.72rem;
      font-weight:700;margin-bottom:12px;
    }
    .q-text{font-size:1.1rem;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:22px}
    .options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .opt{
      padding:12px 16px;border:2px solid #f0d0e8;border-radius:14px;
      background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;
      font-size:.9rem;font-weight:600;text-align:left;
      transition:all .2s;color:var(--text);position:relative;overflow:hidden
    }
    .opt::before{content:'';position:absolute;inset:0;background:transparent;transition:background .2s}
    .opt:hover:not(:disabled){border-color:var(--rose);background:var(--rose-soft)}
    .opt.correct{border-color:#28a745;background:#d4edda;color:#155724}
    .opt.wrong{border-color:#dc3545;background:#f8d7da;color:#721c24}
    .opt.reveal{border-color:#28a745;background:#d4edda;color:#155724}
    .opt:disabled{cursor:default}

    /* FEEDBACK */
    .feedback{
      padding:14px 18px;border-radius:14px;margin-top:14px;
      font-size:.9rem;font-weight:600;display:none;animation:fadeIn .3s ease
    }
    .feedback.ok{background:#d4edda;color:#155724}
    .feedback.ko{background:#f8d7da;color:#721c24}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    /* NEXT BTN */
    .btn-next{
      display:block;width:100%;margin-top:16px;
      background:linear-gradient(135deg,var(--rose),var(--purple));
      color:#fff;border:none;border-radius:30px;
      padding:13px;font-family:'Fredoka One',cursive;font-size:1.1rem;
      cursor:pointer;transition:opacity .2s;display:none
    }
    .btn-next:hover{opacity:.85}

    /* RÉSULTAT FINAL */
    .result-screen{
      background:var(--card);border-radius:22px;padding:36px 28px;
      box-shadow:0 6px 24px rgba(233,30,140,.12);text-align:center;display:none
    }
    .result-screen .big-score{font-family:'Fredoka One',cursive;font-size:4rem;color:var(--rose)}
    .result-screen .sub-score{font-size:1rem;color:var(--sub);margin-bottom:16px}
    .result-screen .mention-final{
      font-family:'Fredoka One',cursive;font-size:1.5rem;margin:12px 0 20px;
      color:var(--rose-dark)
    }
    .result-screen .bar-res{height:12px;background:#f0d0e8;border-radius:10px;overflow:hidden;margin:10px 0 20px}
    .result-screen .bar-res-fill{height:100%;border-radius:10px;background:linear-gradient(to right,var(--rose),var(--purple))}
    .btn-retry{
      background:linear-gradient(135deg,var(--rose),var(--purple));
      color:#fff;border:none;border-radius:30px;padding:12px 36px;
      font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;
      transition:opacity .2s;margin-top:6px
    }
    .btn-retry:hover{opacity:.85}
    .review-list{text-align:left;margin-top:20px}
    .review-item{
      padding:10px 14px;border-radius:12px;margin-bottom:8px;font-size:.85rem;
    }
    .review-item.ok{background:#d4edda;color:#155724}
    .review-item.ko{background:#f8d7da;color:#721c24}

    /* TIMER */
    .timer-wrap{display:flex;align-items:center;gap:8px;margin-bottom:16px}
    .timer-circle{
      width:44px;height:44px;border-radius:50%;
      border:3px solid var(--rose-light);
      display:flex;align-items:center;justify-content:center;
      font-family:'Fredoka One',cursive;font-size:1rem;color:var(--rose-dark);
      transition:border-color .5s
    }
    .timer-circle.urgent{border-color:#dc3545;color:#dc3545}
    .timer-label{font-size:.8rem;color:var(--sub)}

    footer{
      background:linear-gradient(135deg,var(--rose-dark),var(--purple));
      color:rgba(255,255,255,.8);text-align:center;padding:18px;font-size:.85rem;margin-top:10px
    }
    footer span{color:#ffe0f5;font-weight:700}

    @media(max-width:500px){.options{grid-template-columns:1fr}}
  </style>
</head>
<body>

<header>
  <!-- étoiles -->
  <div class="star" style="top:20%;left:15%;animation-delay:.3s">★</div>
  <div class="star" style="top:60%;left:40%;animation-delay:.8s">✦</div>
  <div class="star" style="top:30%;left:70%;animation-delay:1.2s">★</div>
  <div class="star" style="top:70%;left:85%;animation-delay:.5s">✦</div>
  <div class="logo">Quiz<span>Stat</span> 🧠</div>
  <div class="header-right">
    <div class="score-badge">⭐ Score : <span id="liveScore">0</span></div>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  <h1>🧮 Quiz Statistiques & Maths</h1>
  <p>Testez vos connaissances en stats, proba et économie – Licence 1</p>
</div>

<!-- FILTRES -->
<div class="cats" id="cats"></div>

<main>
  <!-- PROGRESS -->
  <div class="prog-wrap" id="progWrap">
    <div class="prog-top">
      <span id="progLabel">Question 1 / 10</span>
      <span id="progPct">0%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <!-- TIMER + QUESTION -->
  <div class="q-card" id="qCard">
    <div class="timer-wrap">
      <div class="timer-circle" id="timerCircle">20</div>
      <div class="timer-label">secondes restantes</div>
    </div>
    <div class="q-num" id="qNum">Question 1</div>
    <div class="q-cat-tag" id="qCatTag"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="opts"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btnNext" onclick="nextQ()">Question suivante →</button>
  </div>

  <!-- RÉSULTAT -->
  <div class="result-screen" id="resultScreen">
    <div style="font-size:3rem" id="resultEmoji">🎉</div>
    <div class="big-score" id="bigScore"></div>
    <div class="sub-score" id="subScore"></div>
    <div class="bar-res"><div class="bar-res-fill" id="barResFill"></div></div>
    <div class="mention-final" id="mentionFinal"></div>
    <button class="btn-retry" onclick="restart()">🔄 Recommencer</button>
    <div class="review-list" id="reviewList"></div>
  </div>
</main>

<footer>Fait avec ❤️ par <span>Evrard</span> – QuizStat v1.0 | HTML · CSS · JavaScript</footer>

<script>
const ALL_QUESTIONS = [
  // ── STATISTIQUES
  {cat:"Statistiques",col:"#e91e8c",
   q:"Quelle règle utilise-t-on pour déterminer le nombre de classes d'un histogramme ?",
   opts:["La règle de Sturges","La règle de Simpson","Le théorème de Bayes","La loi des grands nombres"],
   ans:0, expl:"La règle de Sturges : k ≈ 1 + 3,322 × log₁₀(n). C'est la plus utilisée pour choisir le nombre de classes."},
  {cat:"Statistiques",col:"#e91e8c",
   q:"Dans Stata, quelle commande affiche un tableau de fréquences pour une variable qualitative ?",
   opts:["summarize","tabulate","histogram","codebook"],
   ans:1, expl:"La commande tabulate (ou tab) donne le tableau de fréquences d'une variable qualitative."},
  {cat:"Statistiques",col:"#e91e8c",
   q:"Le coefficient de variation (CV) mesure :",
   opts:["La moyenne d'une distribution","La dispersion relative d'une série","Le nombre de modalités","La valeur médiane"],
   ans:1, expl:"CV = (Écart-type / Moyenne) × 100. Il mesure la dispersion relative, utile pour comparer deux séries."},
  {cat:"Statistiques",col:"#e91e8c",
   q:"Un test ANOVA compare :",
   opts:["Deux proportions","Les moyennes de plusieurs groupes","Deux variances","La médiane d'une série"],
   ans:1, expl:"L'ANOVA (Analyse de la Variance) teste si les moyennes de k groupes sont égales."},

  // ── PROBABILITÉS
  {cat:"Probabilités",col:"#9b59b6",
   q:"Si X ~ N(0,1), quelle est la valeur de E(X) ?",
   opts:["1","0","0,5","Indéterminée"],
   ans:1, expl:"La loi normale centrée réduite N(0,1) a une espérance E(X) = 0 et une variance Var(X) = 1."},
  {cat:"Probabilités",col:"#9b59b6",
   q:"La fonction de répartition F(x) d'une variable aléatoire continue vérifie :",
   opts:["F(+∞) = 0","F(x) peut être négative","F est décroissante","lim F(x) = 1 quand x→+∞"],
   ans:3, expl:"La CDF satisfait : F(-∞)=0, F(+∞)=1, F est croissante et continue à droite."},
  {cat:"Probabilités",col:"#9b59b6",
   q:"Le théorème de Bayes permet de calculer :",
   opts:["La loi d'une somme de variables","Une probabilité conditionnelle a posteriori","L'espérance d'une loi continue","La variance empirique"],
   ans:1, expl:"Bayes : P(A|B) = P(B|A)·P(A) / P(B). Il inverse la conditionnelle — très utile en statistique bayésienne."},
  {cat:"Probabilités",col:"#9b59b6",
   q:"Si X et Y sont indépendantes, alors Cov(X,Y) vaut :",
   opts:["1","−1","0","Var(X)+Var(Y)"],
   ans:2, expl:"L'indépendance implique Cov(X,Y)=0. Attention : la réciproque n'est pas toujours vraie !"},

  // ── MATHÉMATIQUES
  {cat:"Mathématiques",col:"#f472b6",
   q:"Quelle est la dérivée de f(x) = ln(x) ?",
   opts:["1/x²","x","1/x","ln(x)/x"],
   ans:2, expl:"f'(x) = 1/x pour x > 0. C'est une dérivée fondamentale à connaître absolument."},
  {cat:"Mathématiques",col:"#f472b6",
   q:"Une matrice carrée A est inversible si et seulement si :",
   opts:["Sa trace est nulle","Son déterminant est non nul","Elle est symétrique","Sa diagonale est nulle"],
   ans:1, expl:"det(A) ≠ 0 ⟺ A est inversible. Si det(A)=0, la matrice est singulière (non inversible)."},
  {cat:"Mathématiques",col:"#f472b6",
   q:"La méthode du simplexe résout des problèmes de :",
   opts:["Probabilité conditionnelle","Programmation linéaire","Régression multiple","Analyse factorielle"],
   ans:1, expl:"Le simplexe est l'algorithme standard pour optimiser une fonction linéaire sous contraintes linéaires."},

  // ── ÉCONOMIE
  {cat:"Économie",col:"#c2185b",
   q:"Dans le modèle IS-LM, la courbe IS représente :",
   opts:["L'équilibre du marché monétaire","L'équilibre du marché des biens","Le niveau général des prix","L'équilibre de la balance commerciale"],
   ans:1, expl:"IS (Investment = Saving) : équilibre du marché des biens et services. LM : équilibre du marché monétaire."},
  {cat:"Économie",col:"#c2185b",
   q:"Le PIB mesure :",
   opts:["La richesse accumulée d'un pays","La valeur ajoutée totale produite sur un territoire donné en une période","Le revenu des ménages uniquement","Les exportations nettes"],
   ans:1, expl:"PIB = somme des valeurs ajoutées brutes + impôts – subventions sur les produits. C'est un flux, pas un stock."},
  {cat:"Économie",col:"#c2185b",
   q:"La fonction d'utilité de Cobb-Douglas s'écrit :",
   opts:["U = αX + βY","U = Xᵅ · Yᵝ","U = min(X/a, Y/b)","U = X² + Y²"],
   ans:1, expl:"Cobb-Douglas : U = Xᵅ·Yᵝ avec α,β > 0. La fonction de Leontief est min(X/a, Y/b)."},
];

// ── ÉTAT ──
let questions=[], current=0, score=0, answered=[], selectedCat="Tous", timer, timeLeft;

// ── CATÉGORIES ──
const cats=["Tous","Statistiques","Probabilités","Mathématiques","Économie"];
function renderCats(){
  const c=document.getElementById("cats"); c.innerHTML='';
  cats.forEach(cat=>{
    const b=document.createElement('button'); b.className='cat-btn'+(cat===selectedCat?' active':'');
    b.textContent=cat; b.onclick=()=>{selectedCat=cat;renderCats();restart();};
    c.appendChild(b);
  });
}

// ── INIT ──
function getQuestions(){
  const pool=selectedCat==="Tous"?ALL_QUESTIONS:ALL_QUESTIONS.filter(q=>q.cat===selectedCat);
  return shuffle([...pool]).slice(0,Math.min(10,pool.length));
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function restart(){
  clearInterval(timer);
  questions=getQuestions(); current=0; score=0; answered=[];
  document.getElementById("liveScore").textContent=0;
  document.getElementById("resultScreen").style.display="none";
  document.getElementById("qCard").style.display="block";
  document.getElementById("progWrap").style.display="block";
  renderQ();
}

// ── QUESTION ──
function renderQ(){
  const q=questions[current];
  const total=questions.length;
  const pct=Math.round((current/total)*100);

  document.getElementById("qNum").textContent="Question "+(current+1);
  document.getElementById("progLabel").textContent="Question "+(current+1)+" / "+total;
  document.getElementById("progPct").textContent=pct+"%";
  document.getElementById("progFill").style.width=pct+"%";

  const tag=document.getElementById("qCatTag");
  tag.textContent=q.cat; tag.style.background=q.col+"22"; tag.style.color=q.col;

  document.getElementById("qText").textContent=q.q;
  document.getElementById("feedback").style.display="none";
  document.getElementById("btnNext").style.display="none";

  const opts=document.getElementById("opts"); opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button'); b.className='opt';
    b.textContent=o; b.onclick=()=>answer(i);
    opts.appendChild(b);
  });

  startTimer();
}

// ── TIMER ──
function startTimer(){
  clearInterval(timer); timeLeft=20;
  const tc=document.getElementById("timerCircle");
  tc.textContent=timeLeft; tc.classList.remove("urgent");
  timer=setInterval(()=>{
    timeLeft--;
    tc.textContent=timeLeft;
    if(timeLeft<=5) tc.classList.add("urgent");
    if(timeLeft<=0){clearInterval(timer);answer(-1);}
  },1000);
}

// ── RÉPONSE ──
function answer(idx){
  clearInterval(timer);
  const q=questions[current];
  const btns=document.querySelectorAll(".opt");
  btns.forEach(b=>b.disabled=true);
  btns[q.ans].classList.add("correct");

  const fb=document.getElementById("feedback");
  if(idx===q.ans){
    score++;
    document.getElementById("liveScore").textContent=score;
    btns[idx].classList.add("correct");
    fb.className="feedback ok"; fb.textContent="✅ Bonne réponse ! "+q.expl;
  } else if(idx===-1){
    fb.className="feedback ko"; fb.textContent="⏰ Temps écoulé ! La bonne réponse était : "+q.opts[q.ans]+" — "+q.expl;
  } else {
    btns[idx].classList.add("wrong");
    fb.className="feedback ko"; fb.textContent="❌ Mauvaise réponse. "+q.expl;
  }
  fb.style.display="block";
  answered.push({q:q.q,correct:idx===q.ans,correctAns:q.opts[q.ans]});
  document.getElementById("btnNext").style.display="block";
}

// ── SUIVANTE ──
function nextQ(){
  current++;
  if(current>=questions.length){showResult();return;}
  renderQ();
}

// ── RÉSULTAT ──
function showResult(){
  document.getElementById("qCard").style.display="none";
  document.getElementById("progWrap").style.display="none";
  const rs=document.getElementById("resultScreen"); rs.style.display="block";
  const total=questions.length;
  const pct=Math.round((score/total)*100);
  document.getElementById("bigScore").textContent=score+"/"+total;
  document.getElementById("subScore").textContent=pct+"% de bonnes réponses";
  document.getElementById("barResFill").style.width=pct+"%";
  const [emoji,mention]=
    pct>=80?["🏆","Excellent ! Tu maîtrises bien le cours 🎉"]:
    pct>=60?["😊","Bien ! Quelques révisions et ce sera parfait 💪"]:
    pct>=40?["📚","Passable… Revois les notions mal maîtrisées 📖"]:
             ["😅","Courage ! Les bases sont à retravailler 🔁"];
  document.getElementById("resultEmoji").textContent=emoji;
  document.getElementById("mentionFinal").textContent=mention;

  const rl=document.getElementById("reviewList"); rl.innerHTML='<div style="font-weight:700;margin-bottom:8px;color:var(--sub)">Récapitulatif :</div>';
  answered.forEach((a,i)=>{
    const d=document.createElement('div');
    d.className="review-item "+(a.correct?"ok":"ko");
    d.textContent=(a.correct?"✅ ":"❌ ")+"Q"+(i+1)+" : "+a.q.slice(0,60)+"…"+(a.correct?"":"\n→ "+a.correctAns);
    rl.appendChild(d);
  });
}

// ── DÉMARRAGE ──
renderCats();
restart();
</script>
</body>
</html>
